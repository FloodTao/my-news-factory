name: 每日翻译工厂

# 1. 什么时候干活 (Trigger)
on:
  workflow_dispatch: # 允许我们手动点击按钮来测试
  schedule:
    - cron: '0 0 * * *' # 闹钟：每天国际标准时间 0 点（北京时间早上 8 点）自动运行

# 2. 具体干什么 (Jobs)
jobs:
  daily_report:
    runs-on: ubuntu-latest # 租用一台免费的 Linux 虚拟电脑
    
    # 授予管家写文件的权限，否则它没法保存生成的 index.html
    permissions:
      contents: write 

    steps:
      - name: 第一步：拉取代码 (Checkout)
        uses: actions/checkout@v3

      - name: 第二步：准备 Python 环境 (Setup Python)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 第三步：安装零件 (Install Dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 第四步：启动翻译机器 (Run Script)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 从保险柜拿钥匙
        run: python main.py

      - name: 第五步：保存成果并同步 (Commit and Push)
        run: |
          git config --global user.name "News-Bot"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "自动更新今日新闻" || exit 0
          git push
